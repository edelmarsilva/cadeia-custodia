services:
  # ── PostgreSQL ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: cadeia_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cadeia_net

  # ── MinIO (Object Storage S3-compatible) ───────────────────
  minio:
    image: minio/minio:latest
    container_name: cadeia_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cadeia_net

  # ── MinIO Init (cria buckets automaticamente) ──────────────
  minio_init:
    image: minio/mc:latest
    container_name: cadeia_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY};
        mc mb --ignore-existing local/photos;
        mc mb --ignore-existing local/reports;
        mc mb --ignore-existing local/documents;
        mc mb --ignore-existing local/templates;
        mc mb --ignore-existing local/target-photos;
        mc anonymous set download local/photos;
        mc anonymous set none local/reports;
        mc anonymous set none local/documents;
        mc anonymous set none local/templates;
        mc anonymous set none local/target-photos;
        mc cors set local/photos --allowed-origin 'http://localhost:5173' --allowed-origin 'http://localhost:3000' --allowed-method GET --allowed-header '*';
        mc cors set local/reports --allowed-origin 'http://localhost:5173' --allowed-origin 'http://localhost:3000' --allowed-method GET --allowed-header '*';
        mc cors set local/documents --allowed-origin 'http://localhost:5173' --allowed-origin 'http://localhost:3000' --allowed-method GET --allowed-header '*';
        mc cors set local/templates --allowed-origin 'http://localhost:5173' --allowed-origin 'http://localhost:3000' --allowed-method GET --allowed-header '*';
        mc cors set local/target-photos --allowed-origin 'http://localhost:5173' --allowed-origin 'http://localhost:3000' --allowed-method GET --allowed-header '*';
        exit 0;
      "

    networks:
      - cadeia_net

  # ── Backend FastAPI ────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cadeia_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      MINIO_ENDPOINT: minio:9000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - cadeia_net

  # ── Frontend React/Vite ────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cadeia_frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - cadeia_net

volumes:
  postgres_data:
  minio_data:

networks:
  cadeia_net:
    driver: bridge
