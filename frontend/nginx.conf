server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Aumenta limite de upload para 100MB
    client_max_body_size 100M;

    # Compressão gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;

    # Cache de assets estáticos (exclui /storage/)
    location ~* ^(?!/storage/).*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy para a API do backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 100M;
    }

    # Proxy para o MinIO (object storage) — resolve CORS e SignatureDoesNotMatch
    # O browser acessa /storage/ (mesma origem), o Nginx encaminha para minio:9000
    # com Host: minio:9000, que é exatamente o host embutido na assinatura presignada.
    location /storage/ {
        proxy_pass http://minio:9000/;
        proxy_http_version 1.1;
        proxy_set_header Host minio:9000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_hide_header x-amz-id-2;
        proxy_hide_header x-amz-request-id;
        # Permite RANGE requests (necessário para vídeos e PDFs grandes)
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        # Sem cache para arquivos de evidência
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # SPA fallback — todas as rotas do React Router funcionam no refresh
    location / {
        try_files $uri $uri/ /index.html;
    }
}
