name: cadeia_custodia_mobile
description: Aplicativo mobile de coleta guiada de fotografias forenses de apreensão para o Sistema de Cadeia de Custódia de Evidências Digitais. Operação 100% offline — configurado via QR Code e exporta dados como pacote ZIP.
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # Banco de dados local (offline)
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.3

  # Câmera — foto forense
  camera: ^0.11.0+2
  image: ^4.2.0

  # GPS — coordenadas forenses
  geolocator: ^12.0.0

  # QR Code Scanner (offline, sem Google Play Services)
  mobile_scanner: ^5.2.3

  # OCR — IMEI / Serial Number (Google ML Kit, offline)
  google_mlkit_text_recognition: ^0.14.0

  # Criptografia — SHA-256
  crypto: ^3.0.5

  # Geração do pacote ZIP de exportação
  archive: ^3.6.1

  # Compartilhamento via Android Share Sheet
  share_plus: ^9.0.0

  # Permissões
  permission_handler: ^11.3.1

  # UI
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
