name: cadeia_custodia_mobile
description: Aplicativo mobile de coleta guiada de fotografias forenses de apreensão para o Sistema de Cadeia de Custódia de Evidências Digitais.
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # HTTP e Autenticação
  dio: ^5.6.0
  flutter_secure_storage: ^9.2.2

  # Banco de dados local (offline)
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.3

  # Câmera e Mídia
  camera: ^0.11.0+2
  image_picker: ^1.1.2
  image: ^4.2.0

  # GPS
  geolocator: ^12.0.0

  # OCR (Google ML Kit — offline)
  google_mlkit_text_recognition: ^0.14.0

  # Criptografia e Hashing
  crypto: ^3.0.5

  # Conectividade
  connectivity_plus: ^6.0.3

  # Gerenciamento de Estado
  flutter_riverpod: ^2.5.1

  # Navegação
  go_router: ^14.2.7

  # UI
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
